<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LinkOS Finance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3; --surface: #ffffff; --surface2: #f0efeb;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09b;
    --green: #1D9E75; --red: #D85A30;
    --ca: #185FA5; --ca-bg: #E6F1FB;
    --cb: #534AB7; --cb-bg: #EEEDFE;
    --cj: #0F6E56; --cj-bg: #E1F5EE;
    --radius-md: 10px; --radius-lg: 14px; --radius-xl: 18px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181816; --surface: #232320; --surface2: #2c2c29;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
      --text: #f0efe8; --text2: #9a9a94; --text3: #5a5a56;
      --green: #2bc894; --red: #f07050;
      --ca: #85B7EB; --ca-bg: rgba(24,95,165,0.2);
      --cb: #AFA9EC; --cb-bg: rgba(83,74,183,0.2);
      --cj: #5DCAA5; --cj-bg: rgba(15,110,86,0.2);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 3rem; }
  .app { max-width: 480px; margin: 0 auto; padding: 1.25rem 1rem; }

  /* Sync indicator */
  .sync-bar { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); margin-bottom: 1rem; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.syncing { background: #F5A623; animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .header-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 2px; }
  .header-name { font-size: 22px; font-weight: 600; color: var(--text); }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 18px; transition: background 0.15s; }
  .icon-btn:hover { background: var(--surface2); }

  .month-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 99px; padding: 5px 14px; font-size: 12px; color: var(--text2); margin-bottom: 1.25rem; }

  .view-tabs { display: flex; gap: 5px; margin-bottom: 1.25rem; }
  .view-tab { flex: 1; padding: 7px 4px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--surface); color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; font-family: inherit; }
  .view-tab.active-joint { background: var(--cj-bg); color: var(--cj); border-color: var(--cj); }
  .view-tab.active-a { background: var(--ca-bg); color: var(--ca); border-color: var(--ca); }
  .view-tab.active-b { background: var(--cb-bg); color: var(--cb); border-color: var(--cb); }
  .view-tab.active-total { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  .total-card { border-radius: var(--radius-xl); padding: 1.5rem; margin-bottom: 1.25rem; position: relative; overflow: hidden; }
  .total-card.view-joint { background: #085041; }
  .total-card.view-a { background: #0C447C; }
  .total-card.view-b { background: #3C3489; }
  .total-card.view-total { background: #1a1a18; }
  @media (prefers-color-scheme: dark) { .total-card.view-total { background: #2c2c29; } }
  .total-card::after { content:''; position:absolute; top:-40px; right:-40px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.04); }
  .total-label { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,255,255,0.45); margin-bottom:6px; }
  .total-value { font-size:32px; font-weight:600; color:#fff; letter-spacing:-0.02em; margin-bottom:8px; }
  .total-delta { font-size:13px; font-weight:500; }
  .delta-up { color:#2bc894; } .delta-down { color:#f07050; } .delta-neutral { color:rgba(255,255,255,0.35); }

  .summary-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:1.25rem; }
  .summary-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:10px 12px; }
  .summary-label { font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:4px; }
  .summary-value { font-size:15px; font-weight:600; color:var(--text); }

  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; margin-top:1.5rem; }
  .section-title { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text3); }

  .chart-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1rem; }
  .chart-wrap { position:relative; width:100%; height:150px; }
  .empty-state { text-align:center; padding:1.5rem 1rem; color:var(--text3); font-size:13px; }
  .empty-state i { font-size:28px; display:block; margin-bottom:8px; }

  .accounts-list { display:flex; flex-direction:column; gap:8px; }
  .account-row { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:12px 14px; display:flex; align-items:center; gap:10px; }
  .account-icon { width:38px; height:38px; border-radius:var(--radius-md); background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text2); flex-shrink:0; }
  .account-info { flex:1; min-width:0; }
  .account-name { font-size:14px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .account-tags { display:flex; gap:4px; margin-top:3px; flex-wrap:wrap; }
  .account-balance { font-size:15px; font-weight:600; color:var(--text); flex-shrink:0; }
  .act-btn { background:none; border:none; cursor:pointer; color:var(--text3); font-size:17px; padding:4px; flex-shrink:0; border-radius:6px; transition:color 0.15s; }
  .act-btn:hover { color:var(--text); } .act-btn.del:hover { color:var(--red); }

  .tag { display:inline-block; font-size:11px; font-weight:500; padding:2px 8px; border-radius:99px; }
  .tag-bank { background:#E6F1FB; color:#185FA5; }
  .tag-savings { background:#E1F5EE; color:#0F6E56; }
  .tag-investments { background:#EEEDFE; color:#534AB7; }
  .tag-certificates { background:#FAEEDA; color:#854F0B; }
  .tag-other { background:#F1EFE8; color:#5F5E5A; }
  .tag-oa { background:#E6F1FB; color:#185FA5; }
  .tag-ob { background:#EEEDFE; color:#534AB7; }
  .tag-oj { background:#E1F5EE; color:#0F6E56; }
  @media (prefers-color-scheme: dark) {
    .tag-bank { background:rgba(24,95,165,0.2); color:#85B7EB; }
    .tag-savings { background:rgba(15,110,86,0.2); color:#5DCAA5; }
    .tag-investments { background:rgba(83,74,183,0.2); color:#AFA9EC; }
    .tag-certificates { background:rgba(133,79,11,0.2); color:#FAC775; }
    .tag-other { background:rgba(95,94,90,0.2); color:#B4B2A9; }
    .tag-oa { background:rgba(24,95,165,0.2); color:#85B7EB; }
    .tag-ob { background:rgba(83,74,183,0.2); color:#AFA9EC; }
    .tag-oj { background:rgba(15,110,86,0.2); color:#5DCAA5; }
  }

  .btn-row { display:flex; gap:8px; margin-top:1.25rem; }
  .btn { flex:1; padding:12px 8px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--surface); color:var(--text); font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; transition:background 0.15s; font-family:inherit; white-space:nowrap; }
  .btn:hover { background:var(--surface2); }
  .btn-primary { background:var(--text); color:var(--bg); border-color:var(--text); }
  .btn-primary:hover { opacity:0.85; }
  .data-actions { display:flex; gap:8px; margin-top:8px; }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:flex-end; justify-content:center; z-index:200; }
  .modal { background:var(--surface); border-radius:var(--radius-xl) var(--radius-xl) 0 0; padding:1.5rem 1.25rem 2.5rem; width:100%; max-width:480px; border-top:0.5px solid var(--border); max-height:90vh; overflow-y:auto; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
  .modal-title { font-size:16px; font-weight:600; color:var(--text); }
  .form-field { margin-bottom:14px; }
  .form-label { font-size:12px; font-weight:500; color:var(--text2); margin-bottom:5px; display:block; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  input[type=text], input[type=number], input[type=month], select { width:100%; padding:10px 12px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg); color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:border-color 0.15s; }
  input:focus, select:focus { border-color:var(--text2); }
  .owner-select { display:flex; gap:6px; }
  .owner-opt { flex:1; padding:8px; border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg); color:var(--text2); font-size:13px; font-weight:500; cursor:pointer; text-align:center; transition:all 0.15s; font-family:inherit; }
  .owner-opt.sel-a { background:var(--ca-bg); color:var(--ca); border-color:var(--ca); }
  .owner-opt.sel-b { background:var(--cb-bg); color:var(--cb); border-color:var(--cb); }
  .owner-opt.sel-joint { background:var(--cj-bg); color:var(--cj); border-color:var(--cj); }
  .history-row { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-md); padding:10px 14px; display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .info-box { background:var(--surface2); border-radius:var(--radius-md); padding:10px 14px; font-size:12px; color:var(--text2); margin-bottom:1rem; line-height:1.5; }
  .settings-row { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:0.5px solid var(--border); gap:12px; }
  .settings-label { font-size:14px; color:var(--text); flex-shrink:0; }

  .loading-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:999; }
  .loading-spinner { width:32px; height:32px; border:2px solid var(--border2); border-top-color:var(--text); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-size:13px; color:var(--text2); }
  .pin-screen { position:fixed; inset:0; background:var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:997; padding:2rem; }
  .pin-logo { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text3); margin-bottom:4px; }
  .pin-title { font-size:22px; font-weight:600; color:var(--text); margin-bottom:2rem; }
  .pin-dots { display:flex; gap:14px; margin-bottom:0.5rem; }
  .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--border2); background:transparent; transition:all 0.15s; }
  .pin-dot.filled { background:var(--text); border-color:var(--text); }
  .pin-dot.error { background:var(--red); border-color:var(--red); animation:shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pin-error { font-size:12px; color:var(--red); margin-bottom:1rem; min-height:18px; text-align:center; }
  .pin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; max-width:260px; }
  .pin-key { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); height:64px; font-size:22px; font-weight:500; color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.1s; font-family:inherit; }
  .pin-key:active, .pin-key:hover { background:var(--surface2); }
  .pin-setup-note { font-size:12px; color:var(--text3); margin-top:1.5rem; text-align:center; max-width:240px; line-height:1.6; }
</style>
</head>
<body>

<div class="pin-screen" id="pin-screen">
  <div class="pin-logo">Património</div>
  <div class="pin-title">LinkOS Finance</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>

  <div class="pin-grid">
    <button class="pin-key" onclick="pinKey('1')">1</button>
    <button class="pin-key" onclick="pinKey('2')">2</button>

  <button id="pin-forgot-btn" onclick="pinForgot()" style="display:none;margin-top:1rem;background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;text-decoration:underline;">Esqueci o PIN</button>
</div>

<div class="loading-screen" id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">A sincronizar dados…</div>
</div>

<div class="app" style="display:none;" id="main-app">
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">A sincronizar…</span>
  </div>

  <div class="header">
    <div>
      <div class="header-title">Património</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3IumaO2387qMNKzJSrYES9SvA2bstZLc",
  authDomain: "linkos-finance.firebaseapp.com",
  projectId: "linkos-finance",
  storageBucket: "linkos-finance.firebasestorage.app",
  messagingSenderId: "852780033490",
  appId: "1:852780033490:web:f7f526e96322272c5ad40b"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DOC_REF = doc(db, "data", "main");

let S = { accounts: [], snapshots: [], privacy: false, view: 'total', owners: { a: 'Eu', b: 'Ela' } };
let CH = null;
let saving = false;

function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + status;
  label.textContent = status === 'synced' ? 'Sincronizado' : status === 'syncing' ? 'A guardar…' : 'Erro de ligação';
}

async function saveToFirebase() {
  if (saving) return;
  saving = true;
  setSyncStatus('syncing');
  try {
    await setDoc(DOC_REF, S);
    setSyncStatus('synced');
  } catch(e) {
    setSyncStatus('error');
    console.error('Firebase save error:', e);
  }
  saving = false;
}

function save() {
  try { localStorage.setItem('linkos_finance_v4', JSON.stringify(S)); } catch(e) {}
  saveToFirebase();
}

function monthId() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }
const MN = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const MS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function mLabel(id, s) { const [y,m] = id.split('-'); return (s?MS:MN)[parseInt(m)-1] + (s?" '"+y.slice(2):' '+y); }
function fmt(v) { if (S.privacy) return '• • •'; return new Intl.NumberFormat('pt-PT',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v); }
function fmtN(v) { return new Intl.NumberFormat('pt-PT',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v); }

function totalFor(view) {
  const accs = view==='total' ? S.accounts : S.accounts.filter(a=>a.owner===view);
  return accs.reduce((s,a)=>s+(Number(a.balance)||0),0);
}
function deltaFor(view) {
  const snaps = [...S.snapshots].sort((a,b)=>b.month.localeCompare(a.month));
  if (snaps.length < 2) return null;
  const k = view==='total'?'total':'total_'+view;
  if (snaps[0][k]==null||snaps[1][k]==null) return null;
  return snaps[0][k]-snaps[1][k];
}
function dHtml(d, small) {
  if (d===null||S.privacy) return '';
  const cls=d>=0?'delta-up':'delta-down', icon=d>=0?'ti-arrow-up-right':'ti-arrow-down-right';
  return `<span class="${cls}" style="font-size:${small?'11':'13'}px;"><i class="ti ${icon}"></i> ${d>=0?'+':'-'}${fmtN(Math.abs(d))}</span>`;
}

const TL = {bank:'Banco',savings:'Poupança',investments:'Corretora',certificates:'Cert. Aforro',other:'Outro'};
const TI = {bank:'ti-building-bank',savings:'ti-piggy-bank',investments:'ti-trending-up',certificates:'ti-file-certificate',other:'ti-wallet'};
function oTag(o) {
  if (o==='a') return `<span class="tag tag-oa">${S.owners.a}</span>`;
  if (o==='b') return `<span class="tag tag-ob">${S.owners.b}</span>`;
  return `<span class="tag tag-oj">Conjunto</span>`;
}

function render() {
  const d = new Date();
  document.getElementById('current-month-label').textContent = MN[d.getMonth()] + ' ' + d.getFullYear();
  const curMid = monthId();
  const isClosed = S.snapshots.some(s=>s.month===curMid);
  const closedBadge = document.getElementById('month-closed-badge');
  if(closedBadge) closedBadge.style.display = isClosed ? 'block' : 'none';
  document.getElementById('tab-a').textContent = S.owners.a;
  document.getElementById('tab-b').textContent = S.owners.b;
  ['total','joint','a','b'].forEach(v => {
    document.getElementById('tab-'+v).className = 'view-tab'+(S.view===v?' active-'+v:'');
  });
  document.getElementById('total-card').className = 'total-card view-'+S.view;
  const cardLabels = {total:'Total geral',joint:'Contas conjuntas',a:S.owners.a,b:S.owners.b};
  document.getElementById('total-label').textContent = cardLabels[S.view];
  document.getElementById('total-display').textContent = fmt(totalFor(S.view));
  const delta = deltaFor(S.view);
  const dEl = document.getElementById('delta-display');
  if (S.privacy) { dEl.innerHTML=''; }
  else if (delta!==null) { dEl.innerHTML=dHtml(delta,false)+' <span style="color:rgba(255,255,255,0.35);font-size:12px;">vs mês anterior</span>'; }
  else { dEl.innerHTML='<span class="delta-neutral">Sem histórico anterior ainda</span>'; }

  const sr = document.getElementById('summary-row');
  if (S.view==='total') {
    sr.style.display='grid';
    document.getElementById('sum-joint').textContent=fmt(totalFor('joint'));
    document.getElementById('sum-label-a').textContent=S.owners.a;
    document.getElementById('sum-a').textContent=fmt(totalFor('a'));
    document.getElementById('sum-label-b').textContent=S.owners.b;
    document.getElementById('sum-b').textContent=fmt(totalFor('b'));
  } else { sr.style.display='none'; }

  const accs = S.view==='total'?S.accounts:S.accounts.filter(a=>a.owner===S.view);
  const list = document.getElementById('accounts-list');
  document.getElementById('accounts-count').textContent = accs.length?accs.length+' conta'+(accs.length!==1?'s':''):'';
  if (!accs.length) {
    list.innerHTML=`<div class="empty-state"><i class="ti ti-wallet"></i>Sem contas nesta vista.</div>`;
  } else {
    list.innerHTML=accs.map(a=>{
      const i=S.accounts.indexOf(a);
      return `<div class="account-row">
        <div class="account-icon"><i class="ti ${TI[a.type]||'ti-wallet'}"></i></div>
        <div class="account-info">
          <div class="account-name">${a.name}</div>
          <div class="account-tags"><span class="tag tag-${a.type}">${TL[a.type]||a.type}</span>${oTag(a.owner||'joint')}</div>
        </div>
        <div class="account-balance">${fmt(Number(a.balance)||0)}</div>
        <button class="act-btn" onclick="window._editAcc(${i})"><i class="ti ti-pencil"></i></button>
        <button class="act-btn del" onclick="window._delAcc(${i})"><i class="ti ti-trash"></i></button>
      </div>`;
    }).join('');
  }
  document.querySelector('#privacy-toggle i').className=S.privacy?'ti ti-eye-off':'ti ti-eye';
  renderChart();
}

function renderChart() {
  const snaps=[...S.snapshots].sort((a,b)=>a.month.localeCompare(b.month));
  const canvas=document.getElementById('evolution-chart');
  const empty=document.getElementById('chart-empty');
  const key=S.view==='total'?'total':'total_'+S.view;
  const valid=snaps.filter(s=>s[key]!=null);
  if (valid.length<2) { canvas.style.display='none'; empty.style.display='block'; if(CH){CH.destroy();CH=null;} return; }
  canvas.style.display='block'; empty.style.display='none';
  const isDark=matchMedia('(prefers-color-scheme: dark)').matches;
  const lc={total:isDark?'#2bc894':'#1D9E75',joint:isDark?'#5DCAA5':'#0F6E56',a:isDark?'#85B7EB':'#185FA5',b:isDark?'#AFA9EC':'#534AB7'}[S.view];
  const gc=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.05)';
  const tc=isDark?'#5a5a56':'#b0b0aa';
  if (CH) CH.destroy();
  CH=new Chart(canvas,{type:'line',data:{labels:valid.map(s=>mLabel(s.month,true)),datasets:[{data:valid.map(s=>s[key]),borderColor:lc,backgroundColor:lc+'15',borderWidth:2,pointBackgroundColor:lc,pointRadius:4,pointHoverRadius:6,fill:true,tension:0.35}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>S.privacy?'• • •':fmtN(ctx.raw)}}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,font:{size:11},callback:v=>S.privacy?'•••':(v>=1000?(v/1000).toFixed(0)+'k€':v+'€')}}}}});
}

function calcSnap(){
  const total=S.accounts.reduce((s,a)=>s+(Number(a.balance)||0),0);
  const tj=S.accounts.filter(a=>a.owner==='joint').reduce((s,a)=>s+(Number(a.balance)||0),0);
  const ta=S.accounts.filter(a=>a.owner==='a').reduce((s,a)=>s+(Number(a.balance)||0),0);
  const tb=S.accounts.filter(a=>a.owner==='b').reduce((s,a)=>s+(Number(a.balance)||0),0);
  return{total,total_joint:tj,total_a:ta,total_b:tb};
}

{

window._applyReciboJson = function() {
  const raw = document.getElementById('json-paste').value.trim();
  let recibo;
  try {
    recibo = JSON.parse(raw);
  } catch(e) {
    alert('JSON inválido. Verifica se copiaste tudo corretamente.');
    return;
  }
  if (!recibo.mes || !recibo.liquido_total) {
    alert('JSON incompleto. Faltam campos obrigatórios (mes, liquido_total).');
    return;
  }
  if (!S.recibos) S.recibos = [];
  S.recibos = S.recibos.filter(r => r.mes !== recibo.mes);
  S.recibos.push(recibo);
  save();
  closeModal();
  setTimeout(() => {
    showSalary();
  }, 50);
};

window.showReciboHistory = function() {
  const recibos = [...(S.recibos||[])].sort((a,b)=>b.mes.localeCompare(a.mes));
  const rows = recibos.map(r => `
    <div style="margin-bottom:1rem;">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text);">${mLabel(r.mes)}</div>
      ${renderReciboCard(r)}
      <button class="act-btn del" onclick="window._delRecibo('${r.mes}')" style="margin-top:4px;"><i class="ti ti-trash"></i> Apagar</button>
    </div>
  `).join('<hr style="border:none;border-top:0.5px solid var(--border);margin:1rem 0;">');
  showModal(`${mHead('Histórico de recibos')}${rows}<button class="btn" style="width:100%;margin-top:1rem;" onclick="closeModal()">Fechar</button>`);
};

window._delRecibo = function(mes) {
  if (confirm('Apagar recibo de '+mLabel(mes)+'?')) {
    S.recibos = (S.recibos||[]).filter(r=>r.mes!==mes);
    save(); closeModal(); render();
  }
};

// PIN system
const PIN_KEY_LS = 'lf_pin';
let pinBuffer = '';
let pinMode = 'check'; // 'check' or 'setup'
let pinSetupFirst = '';

function pinHash(p) {
  let h = 0;
  for (let i = 0; i < p.length; i++) { h = ((h << 5) - h) + p.charCodeAt(i); h |= 0; }
  return String(Math.abs(h));
}

function showPinScreen(mode) {
  pinMode = mode;
  pinBuffer = '';
  pinSetupFirst = '';
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('pin-error').textContent = '';
  if (mode === 'setup') {
    document.getElementById('pin-setup-note').textContent = 'Escolhe um PIN de 4 dígitos para proteger a app.';
  } else {
    document.getElementById('pin-setup-note').textContent = '';
  }
  updatePinDots();
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pd' + i);
    dot.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
  }
}

function pinKey(k) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(pinSubmit, 120);
}

function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
}

function pinSubmit() {
  const stored = localStorage.getItem(PIN_KEY_LS);
  if (pinMode === 'check') {
    if (pinHash(pinBuffer) === stored) {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('loading-screen').style.display = 'flex';
      initApp();
    } else {
      ['pd0','pd1','pd2','pd3'].forEach(id => {
        const d = document.getElementById(id);
        d.className = 'pin-dot error';
      });
      document.getElementById('pin-error').textContent = 'PIN incorreto. Tenta novamente.';
      pinAttempts = (pinAttempts||0) + 1;
      if(pinAttempts >= 2) { const fb=document.getElementById('pin-forgot-btn'); if(fb) fb.style.display='block'; }
      setTimeout(() => { pinBuffer = ''; updatePinDots(); document.getElementById('pin-error').textContent=''; }, 800);
    }
  } else if (pinMode === 'setup') {
    if (!pinSetupFirst) {
      pinSetupFirst = pinBuffer;
      pinBuffer = '';
      updatePinDots();
      document.getElementById('pin-setup-note').textContent = 'Confirma o PIN.';
    } else {
      if (pinBuffer === pinSetupFirst) {
        localStorage.setItem(PIN_KEY_LS, pinHash(pinBuffer));
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        initApp();
      } else {
        pinSetupFirst = '';
        pinBuffer = '';
        updatePinDots();
        document.getElementById('pin-error').textContent = 'PINs não coincidem. Tenta de novo.';
        document.getElementById('pin-setup-note').textContent = 'Escolhe um PIN de 4 dígitos.';
        setTimeout(() => document.getElementById('pin-error').textContent='', 1500);
      }
    }
  }
}

let pinAttempts = 0;
window.pinForgot = function(){
  const recovery = localStorage.getItem('lf_pin_recovery');
  if(!recovery){
    alert('Não tens palavra-passe de recuperação definida. Contacta o administrador da app.');
    return;
  }
  const input = prompt('Introduz a tua palavra-passe de recuperação:');
  if(input === recovery){
    localStorage.removeItem(PIN_KEY_LS);
    pinAttempts = 0;
    document.getElementById('pin-forgot-btn').style.display='none';
    showPinScreen('setup');
    document.getElementById('pin-setup-note').textContent = 'Define um novo PIN de 4 dígitos.';
  } else {
    alert('Palavra-passe incorreta.');
  }
};
window.pinKey = pinKey;
window.pinDel = pinDel;

async function initApp() {
  try {
    const snap = await getDoc(DOC_REF);
    if (snap.exists()) {
      S = { ...S, ...snap.data() };
    } else {
      // Sem dados no Firebase — carrega seed data histórico
      S = { ...S, ...SEED_DATA };
      await setDoc(DOC_REF, S);
    }
  } catch(e) {
    // Offline — tenta localStorage, senão seed data
    try {
      const raw = localStorage.getItem('linkos_finance_v4');
      if (raw) S = { ...S, ...JSON.parse(raw) };
      else S = { ...S, ...SEED_DATA };
    } catch(ex) { S = { ...S, ...SEED_DATA }; }
    setSyncStatus('error');
  }
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  setSyncStatus('synced');
  render();

  // Listen for real-time updates from other devices
  onSnapshot(DOC_REF, (docSnap) => {
    if (docSnap.exists()) {
      const remote = docSnap.data();
      if (!saving) {
        S = { ...S, ...remote };
        try { localStorage.setItem('linkos_finance_v4', JSON.stringify(S)); } catch(e){}
        render();
      }
    }
  });
}

function startApp() {
  const stored = localStorage.getItem(PIN_KEY_LS);
  if (!stored) {
    showPinScreen('setup');
  } else {
    showPinScreen('check');
  }
}
